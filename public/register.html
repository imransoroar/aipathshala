<!doctype html>
<html lang="bn" data-lang="bn">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign up — AI Pathshala</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<header id="site-header"></header>
<main class="page"><div class="container">
  <div class="auth-wrap">
    <h1 data-i18n="signup_title"></h1>
    <form id="regForm">
      <div class="field"><label data-i18n="name"></label><input class="input" id="name" required></div>
      <div class="field"><label data-i18n="email"></label><input class="input" type="email" id="email" required></div>
      <div class="field"><label data-i18n="phone"></label><input class="input" id="phone"></div>
      <div class="field"><label data-i18n="password"></label><input class="input" type="password" id="password" minlength="6" required></div>
      <button class="btn btn-primary btn-block" type="submit" data-i18n="signup"></button>
    </form>
    <p class="auth-alt"><span data-i18n="have_account"></span> <a href="/login.html" data-i18n="login"></a></p>
  </div>
</div></main>
<footer id="site-footer"></footer>
<script src="/js/i18n.js"></script>
<script src="/js/api.js"></script>
<script>
const next = new URLSearchParams(location.search).get('next') || '/dashboard.html';
document.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('regForm').onsubmit = async (e)=>{
    e.preventDefault();
    try{
      await API.register({
        name:document.getElementById('name').value.trim(),
        email:document.getElementById('email').value.trim(),
        phone:document.getElementById('phone').value.trim(),
        password:document.getElementById('password').value,
      });
      toast(t('welcome_back'),'ok'); setTimeout(()=>location.href=next,500);
    }catch(err){ toast(err.message,'err'); }
  };
});
</script>
<script src="/js/app.js"></script>
</body>
</html>
