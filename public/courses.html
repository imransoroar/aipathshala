<!doctype html>
<html lang="bn" data-lang="bn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Courses — AI Pathshala</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<header id="site-header"></header>
<main class="page">
  <div class="container">
    <div class="page-head">
      <h1 data-i18n="all_courses"></h1>
      <p class="muted" data-i18n="tagline"></p>
    </div>
    <div class="toolbar">
      <input class="input search-box" id="search" data-i18n-ph="search_ph">
      <select id="sort">
        <option value="">— <span></span></option>
        <option value="popular" data-i18n="sort_popular"></option>
        <option value="new" data-i18n="sort_new"></option>
        <option value="price-low" data-i18n="sort_low"></option>
        <option value="price-high" data-i18n="sort_high"></option>
      </select>
    </div>
    <div class="chips" id="catChips" style="margin-bottom:24px"></div>
    <div class="course-grid" id="grid"><div class="spinner"></div></div>
  </div>
</main>
<footer id="site-footer"></footer>
<script src="/js/i18n.js"></script>
<script src="/js/api.js"></script>
<script src="/js/components.js"></script>
<script>
let state = { category:'', q:'', sort:'popular' };
const params = new URLSearchParams(location.search);
if(params.get('category')) state.category = params.get('category');

async function loadCats(){
  const {categories} = await API.get('/courses/categories');
  const chips = document.getElementById('catChips');
  const all = `<button class="chip ${state.category?'':'active'}" data-cat="">${t('filter_all')}</button>`;
  chips.innerHTML = all + categories.map(c=>`<button class="chip ${state.category===c.slug?'active':''}" data-cat="${c.slug}">${c.icon||''} ${L(c,'name')}</button>`).join('');
  chips.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{ state.category=b.dataset.cat; loadCats(); load(); });
}
async function load(){
  const grid = document.getElementById('grid');
  grid.innerHTML = '<div class="spinner"></div>';
  const qs = new URLSearchParams();
  if(state.category) qs.set('category', state.category);
  if(state.q) qs.set('q', state.q);
  if(state.sort) qs.set('sort', state.sort);
  try{
    const {courses} = await API.get('/courses?'+qs.toString());
    grid.innerHTML = courses.length ? courses.map(courseCard).join('') : `<div class="empty">${t('empty_courses')}</div>`;
  }catch(e){ grid.innerHTML = `<div class="empty">${e.message}</div>`; }
}
document.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('sort').value = state.sort;
  document.getElementById('search').oninput = (e)=>{ state.q=e.target.value; clearTimeout(window._t); window._t=setTimeout(load,300); };
  document.getElementById('sort').onchange = (e)=>{ state.sort=e.target.value; load(); };
  loadCats(); load();
  if(location.hash==='#categories') document.getElementById('catChips').scrollIntoView();
});
document.addEventListener('langchange', ()=>{ loadCats(); load(); });
</script>
<script src="/js/app.js"></script>
</body>
</html>
