<!doctype html>
<html lang="bn" data-lang="bn">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Learn — AI Pathshala</title>
<link rel="stylesheet" href="/css/styles.css">
<style>
/* ===== custom branded video player ===== */
.vplayer{position:relative;width:100%;aspect-ratio:16/9;background:#000;overflow:hidden;border-radius:0}
.vplayer iframe,.vplayer #ytplayer{position:absolute;inset:0;width:100%;height:100%;border:0}
.vp-shield{position:absolute;inset:0;z-index:2;pointer-events:none}
.vp-top{position:absolute;top:0;left:0;right:0;z-index:4;display:flex;align-items:center;gap:10px;padding:14px 18px;
  background:linear-gradient(180deg,rgba(10,9,18,.85),transparent);color:#fff;transition:opacity .25s;pointer-events:none}
.vp-top .vp-logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#7c3aed,#06b6d4);display:grid;place-items:center;font-weight:900;font-size:.75rem}
.vp-top .vp-title{font-weight:700;font-size:.98rem;text-shadow:0 1px 4px rgba(0,0,0,.5)}
.vplayer.idle .vp-top,.vplayer.idle .vp-controls{opacity:0}
.vp-center{position:absolute;inset:0;z-index:3;display:grid;place-items:center;pointer-events:none}
.vp-center button{pointer-events:none;width:78px;height:78px;border-radius:50%;border:0;cursor:pointer;
  background:rgba(124,58,237,.92);color:#fff;font-size:1.9rem;box-shadow:0 10px 30px rgba(0,0,0,.4);transition:transform .15s,background .2s;display:grid;place-items:center}
.vp-center button:hover{transform:scale(1.08);background:#7c3aed}
.vp-center.hidden{display:none}
.vp-controls{position:absolute;left:0;right:0;bottom:0;z-index:4;display:flex;align-items:center;gap:12px;padding:14px 18px;
  background:linear-gradient(0deg,rgba(10,9,18,.9),transparent);transition:opacity .25s}
.vp-controls button{background:none;border:0;color:#fff;cursor:pointer;font-size:1.05rem;line-height:1;display:grid;place-items:center;padding:4px;border-radius:6px;transition:.15s}
.vp-controls button:hover{color:#22d3ee;transform:scale(1.12)}
.vp-time{color:#e7e3f5;font-size:.82rem;font-variant-numeric:tabular-nums;min-width:42px;text-align:center}
.vp-seek{flex:1;-webkit-appearance:none;appearance:none;height:6px;border-radius:6px;cursor:pointer;
  background:linear-gradient(to right,#22d3ee 0%,#22d3ee 0%,rgba(255,255,255,.25) 0%);outline:none}
.vp-seek::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:#fff;border:2px solid #7c3aed;box-shadow:0 0 0 4px rgba(124,58,237,.35);cursor:pointer}
.vp-seek::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:#fff;border:2px solid #7c3aed;cursor:pointer}
.vp-vol{-webkit-appearance:none;appearance:none;width:80px;height:5px;border-radius:5px;cursor:pointer;
  background:linear-gradient(to right,#fff 100%,rgba(255,255,255,.25) 0%)}
.vp-vol::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#fff;cursor:pointer}
.vp-vol::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:#fff;border:0;cursor:pointer}
.vp-rate{font-weight:800;font-size:.82rem!important;min-width:34px}
.vp-spacer{flex:0 0 4px}
/* up-next overlay */
.vp-upnext{position:absolute;right:22px;bottom:80px;z-index:5;background:rgba(18,13,30,.95);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:16px 18px;color:#fff;width:280px;box-shadow:0 18px 50px rgba(0,0,0,.5);display:none}
.vp-upnext.show{display:block;animation:uppop .25s ease}
@keyframes uppop{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.vp-upnext .lbl{font-size:.78rem;color:#a9a2c4;text-transform:uppercase;letter-spacing:.08em}
.vp-upnext .nm{font-weight:700;margin:4px 0 12px}
.vp-upnext .ct{font-size:.8rem;color:#22d3ee;margin-bottom:10px}
.vp-upnext .row{display:flex;gap:8px}
/* progress ring */
.prog-card{display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,#f5f3ff,#ecfeff);border:1px solid var(--violet-100);border-radius:16px;padding:16px 18px}
.ring{--p:0;width:64px;height:64px;border-radius:50%;flex-shrink:0;
  background:conic-gradient(var(--primary) calc(var(--p)*3.6deg),var(--violet-100) 0);display:grid;place-items:center}
.ring::before{content:"";position:absolute;width:48px;height:48px;border-radius:50%;background:#fff}
.ring span{position:relative;font-weight:800;font-family:'Sora',sans-serif;font-size:.95rem;color:var(--primary)}
.prog-card .pl{font-weight:800;font-size:1.05rem}
.sec-head{padding:14px 22px 6px;font-weight:800;color:var(--primary);font-size:.82rem;text-transform:uppercase;letter-spacing:.06em;background:#fbfaff;border-bottom:1px solid var(--line)}
.autoplay-row{display:flex;align-items:center;gap:10px;margin-top:14px}
.switch{position:relative;width:42px;height:24px;border-radius:999px;background:var(--line);cursor:pointer;transition:.2s;flex-shrink:0}
.switch.on{background:var(--grad-primary)}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.switch.on::after{left:21px}
</style>
</head>
<body>
<header id="site-header"></header>
<div id="root"><div class="spinner"></div></div>
<script src="/js/i18n.js"></script>
<script src="/js/api.js"></script>
<script>
const courseId = new URLSearchParams(location.search).get('course');
let PLAYER=null, current=0, ytp=null, tick=null, seeking=false, autoplay=true, ended=false;

function ytId(url){ const s=String(url||''); let m=s.match(/embed\/([A-Za-z0-9_-]{6,})/)||s.match(/[?&]v=([A-Za-z0-9_-]{6,})/)||s.match(/youtu\.be\/([A-Za-z0-9_-]{6,})/); return m?m[1]:''; }
function fmt(t){ t=Math.max(0,Math.floor(t||0)); const m=Math.floor(t/60),s=t%60; return m+':'+(s<10?'0':'')+s; }

async function load(){
  if(!requireLogin()) return;
  try{ PLAYER = await API.get('/enrollments/'+courseId+'/player'); renderShell(); initPlayer(); }
  catch(e){ document.getElementById('root').innerHTML = `<div class="page container"><div class="empty">${e.message}<br><a class="btn btn-primary btn-sm" style="margin-top:12px" href="/courses.html">${t('all_courses')}</a></div></div>`; }
}

function sidebarHtml(){
  const {lessons,progress}=PLAYER;
  // group by section preserving order, keep global index
  const groups=[],idx={};
  lessons.forEach((l,i)=>{ const key=(L(l,'section')||'').trim()||'__none';
    if(!(key in idx)){idx[key]=groups.length;groups.push({name:L(l,'section')||'',items:[]});}
    groups[idx[key]].items.push({l,i}); });
  const list=groups.map(g=>`
    ${g.name?`<div class="sec-head">${g.name}</div>`:''}
    ${g.items.map(({l,i})=>`<div class="s-lesson ${i===current?'active':''} ${l.completed?'done':''}" data-i="${i}">
      <div class="tick">${l.completed?'✓':i+1}</div>
      <div><div style="font-weight:600;font-size:.92rem">${L(l,'title')}</div><div class="muted" style="font-size:.8rem">${l.durationMin||0} min</div></div>
    </div>`).join('')}`).join('');
  return `
    <div class="sidebar-head">
      <div class="prog-card">
        <div class="ring" id="ring" style="--p:${progress.percent};position:relative"><span id="ringTxt">${progress.percent}%</span></div>
        <div><div class="pl">${t('course_progress')}</div>
          <div class="muted" style="font-size:.85rem"><span id="progCount">${progress.completed}/${progress.total}</span> ${t('lessons')} ${t('completed')}</div></div>
      </div>
      <div class="autoplay-row">
        <div class="switch on" id="autoSwitch"></div>
        <span style="font-weight:600;font-size:.9rem">${t('autoplay')}</span>
      </div>
    </div>
    <div id="lessonNav">${list}</div>`;
}

function renderShell(){
  const {course,lessons}=PLAYER;
  document.getElementById('root').innerHTML=`
  <div class="learn-layout">
    <div class="player-main">
      <div class="vplayer idle" id="vplayer">
        <div id="ytplayer"></div>
        <div class="vp-shield" id="vpShield"></div>
        <div class="vp-top"><div class="vp-logo">AI</div><span class="vp-title" id="vpTitle"></span></div>
        <div class="vp-center" id="vpCenter"><button id="vpBig">▶</button></div>
        <div class="vp-upnext" id="vpUpNext">
          <div class="lbl">${t('up_next')}</div>
          <div class="nm" id="upNextName"></div>
          <div class="ct"><span id="upCount">5</span>s · ${t('playing_next')}</div>
          <div class="row"><button class="btn btn-accent btn-sm" id="upPlay">▶ ${t('next_lesson')}</button>
            <button class="btn btn-ghost btn-sm" id="upCancel" style="color:#fff;border-color:rgba(255,255,255,.4)">${t('cancel')}</button></div>
        </div>
        <div class="vp-controls" id="vpControls">
          <button id="vpPlay">▶</button>
          <span class="vp-time" id="vpCur">0:00</span>
          <input type="range" class="vp-seek" id="vpSeek" min="0" max="1000" value="0">
          <span class="vp-time" id="vpDur">0:00</span>
          <button id="vpMute">🔊</button>
          <input type="range" class="vp-vol" id="vpVol" min="0" max="100" value="100">
          <span class="vp-spacer"></span>
          <button id="vpRate" class="vp-rate">1×</button>
          <button id="vpFs">⛶</button>
        </div>
      </div>
      <div class="player-info">
        <div class="muted" style="font-size:.85rem" id="lessonMeta"></div>
        <h2 id="lessonTitle"></h2>
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
          <button class="btn btn-accent" id="completeBtn"></button>
          <button class="btn btn-primary" id="nextBtn">${t('next_lesson')} →</button>
        </div>
        <p style="margin-top:18px;white-space:pre-line" id="lessonContent"></p>
      </div>
    </div>
    <aside class="sidebar" id="sidebar">${sidebarHtml()}</aside>
  </div>`;
  wireShell();
  updateLessonInfo();
}

function wireShell(){
  document.getElementById('vpPlay').onclick=togglePlay;
  document.getElementById('vpMute').onclick=toggleMute;
  document.getElementById('vpFs').onclick=toggleFs;
  document.getElementById('vpRate').onclick=cycleRate;
  const seek=document.getElementById('vpSeek');
  seek.addEventListener('input',()=>{ seeking=true; paintSeek(seek.value/10); });
  seek.addEventListener('change',()=>{ if(ytp){ const d=ytp.getDuration()||0; ytp.seekTo(d*(seek.value/1000),true);} seeking=false; });
  document.getElementById('vpVol').addEventListener('input',e=>{ if(ytp){ ytp.setVolume(+e.target.value); ytp.unMute(); } paintVol(+e.target.value); document.getElementById('vpMute').textContent=(+e.target.value===0)?'🔇':'🔊'; });
  document.getElementById('autoSwitch').onclick=function(){ autoplay=!autoplay; this.classList.toggle('on',autoplay); };
  document.getElementById('upCancel').onclick=cancelUpNext;
  document.getElementById('upPlay').onclick=()=>{ cancelUpNext(); selectLesson(current+1); };
  document.getElementById('nextBtn').onclick=()=>{ if(current<PLAYER.lessons.length-1) selectLesson(current+1); };
  bindSidebar();
  // auto-hide controls when idle
  const vp=document.getElementById('vplayer'); let hideT;
  vp.onmousemove=()=>{ vp.classList.remove('idle'); clearTimeout(hideT); hideT=setTimeout(()=>{ if(ytp&&ytp.getPlayerState&&ytp.getPlayerState()===1) vp.classList.add('idle'); },2200); };
}

function bindSidebar(){ document.querySelectorAll('.s-lesson').forEach(s=>s.onclick=()=>selectLesson(Number(s.dataset.i))); }

function updateLessonInfo(){
  const {course,lessons}=PLAYER; const l=lessons[current];
  document.getElementById('vpTitle').textContent=L(l,'title');
  document.getElementById('lessonMeta').textContent=`${L(course,'title')} • ${current+1}/${lessons.length}`;
  document.getElementById('lessonTitle').textContent=L(l,'title');
  document.getElementById('lessonContent').textContent=L(l,'content')||'';
  const cb=document.getElementById('completeBtn');
  cb.textContent=l.completed?('✓ '+t('completed')):t('mark_complete');
  cb.className='btn '+(l.completed?'btn-ghost':'btn-accent');
  cb.onclick=async()=>{ await setComplete(!l.completed); };
  document.getElementById('nextBtn').style.display=current<lessons.length-1?'':'none';
  document.querySelectorAll('.s-lesson').forEach(s=>s.classList.toggle('active',Number(s.dataset.i)===current));
}

async function setComplete(done){
  const l=PLAYER.lessons[current];
  try{ const r=await API.post('/enrollments/'+courseId+'/complete',{lessonId:l.id,done});
    l.completed=done; PLAYER.progress=r.progress; refreshProgress(); updateLessonInfo(); markSidebarDone(current,done);
    if(done) toast('✓','ok');
  }catch(e){ toast(e.message,'err'); }
}
function markSidebarDone(i,done){ const el=document.querySelector('.s-lesson[data-i="'+i+'"]'); if(el){ el.classList.toggle('done',done); el.querySelector('.tick').textContent=done?'✓':(i+1);} }
function refreshProgress(){ const p=PLAYER.progress; const ring=document.getElementById('ring'); if(ring){ ring.style.setProperty('--p',p.percent); document.getElementById('ringTxt').textContent=p.percent+'%'; document.getElementById('progCount').textContent=p.completed+'/'+p.total; } }

function selectLesson(i){
  if(i<0||i>=PLAYER.lessons.length) return;
  current=i; ended=false; cancelUpNext();
  updateLessonInfo();
  const id=ytId(PLAYER.lessons[i].videoUrl);
  document.getElementById('vpCenter').classList.add('hidden');
  if(ytp&&ytp.loadVideoById){ ytp.loadVideoById(id); }
}

/* ---- YouTube IFrame API ---- */
function initPlayer(){
  loadYT(()=>{
    const id=ytId(PLAYER.lessons[current].videoUrl);
    ytp=new YT.Player('ytplayer',{
      videoId:id,
      playerVars:{controls:0,modestbranding:1,rel:0,iv_load_policy:3,playsinline:1,fs:0,disablekb:1,color:'white',cc_load_policy:0,origin:location.origin},
      events:{ onReady:onReady, onStateChange:onState }
    });
  });
}
function loadYT(cb){ if(window.YT&&window.YT.Player){cb();return;} const prev=window.onYouTubeIframeAPIReady; window.onYouTubeIframeAPIReady=()=>{ prev&&prev(); cb(); }; if(!document.getElementById('yt-api')){ const s=document.createElement('script'); s.id='yt-api'; s.src='https://www.youtube.com/iframe_api'; document.head.appendChild(s);} }

function onReady(){ try{ ytp.setVolume(100); }catch(e){} startTick(); }
function onState(e){
  const vp=document.getElementById('vplayer');
  if(e.data===YT.PlayerState.PLAYING){ setPlayIcons(true); ended=false; document.getElementById('vpCenter').classList.add('hidden'); }
  else if(e.data===YT.PlayerState.PAUSED){ setPlayIcons(false); showCenter('▶'); }
  else if(e.data===YT.PlayerState.ENDED){ onEnded(); }
}
function setPlayIcons(playing){ const a=document.getElementById('vpPlay'); if(a)a.textContent=playing?'⏸':'▶'; const b=document.getElementById('vpBig'); if(b)b.textContent=playing?'⏸':'▶'; }
function showCenter(icon){ const c=document.getElementById('vpCenter'); if(c){ c.classList.remove('hidden'); document.getElementById('vpBig').textContent=icon; } }

function togglePlay(){ if(!ytp)return; const st=ytp.getPlayerState(); if(st===1){ ytp.pauseVideo(); } else { if(ended){ ytp.seekTo(0); ended=false; } ytp.playVideo(); } }
function toggleMute(){ if(!ytp)return; if(ytp.isMuted()){ ytp.unMute(); document.getElementById('vpMute').textContent='🔊'; document.getElementById('vpVol').value=ytp.getVolume()||100; paintVol(ytp.getVolume()||100);} else { ytp.mute(); document.getElementById('vpMute').textContent='🔇'; paintVol(0);} }
const RATES=[1,1.25,1.5,2,0.5,0.75];
let rateI=0;
function cycleRate(){ if(!ytp)return; rateI=(rateI+1)%RATES.length; ytp.setPlaybackRate(RATES[rateI]); document.getElementById('vpRate').textContent=RATES[rateI]+'×'; }
function toggleFs(){ const vp=document.getElementById('vplayer'); if(!document.fullscreenElement){ (vp.requestFullscreen||vp.webkitRequestFullscreen||function(){}).call(vp); } else { document.exitFullscreen&&document.exitFullscreen(); } }

function paintSeek(p){ const el=document.getElementById('vpSeek'); if(el) el.style.background=`linear-gradient(to right,#22d3ee ${p}%,rgba(255,255,255,.25) ${p}%)`; }
function paintVol(v){ const el=document.getElementById('vpVol'); if(el) el.style.background=`linear-gradient(to right,#fff ${v}%,rgba(255,255,255,.25) ${v}%)`; }

function startTick(){ clearInterval(tick); tick=setInterval(()=>{
  if(!ytp||!ytp.getDuration) return; const d=ytp.getDuration()||0, c=ytp.getCurrentTime()||0;
  document.getElementById('vpDur').textContent=fmt(d);
  if(!seeking){ document.getElementById('vpCur').textContent=fmt(c); const p=d?(c/d*100):0; document.getElementById('vpSeek').value=Math.round(p*10); paintSeek(p); }
},250); }

/* ---- auto-next ---- */
let upTimer=null;
async function onEnded(){
  ended=true; setPlayIcons(false);
  const l=PLAYER.lessons[current];
  if(!l.completed) await setComplete(true);
  if(autoplay && current<PLAYER.lessons.length-1){ showUpNext(); }
  else { showCenter('↺'); }
}
function showUpNext(){
  const nx=PLAYER.lessons[current+1];
  const box=document.getElementById('vpUpNext'); document.getElementById('upNextName').textContent=L(nx,'title');
  let n=5; document.getElementById('upCount').textContent=n; box.classList.add('show');
  clearInterval(upTimer);
  upTimer=setInterval(()=>{ n--; document.getElementById('upCount').textContent=n; if(n<=0){ clearInterval(upTimer); cancelUpNext(); selectLesson(current+1); } },1000);
}
function cancelUpNext(){ clearInterval(upTimer); const b=document.getElementById('vpUpNext'); if(b)b.classList.remove('show'); }

document.addEventListener('DOMContentLoaded', load);
document.addEventListener('langchange', ()=>{ if(!PLAYER) return; const wasMuted=ytp&&ytp.isMuted&&ytp.isMuted(); renderShell(); if(ytp&&ytp.destroy){ try{ytp.destroy();}catch(e){} ytp=null; } initPlayer(); });
</script>
<script src="/js/app.js"></script>
</body>
</html>
