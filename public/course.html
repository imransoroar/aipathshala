<!doctype html>
<html lang="bn" data-lang="bn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Course — AI Pathshala</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<header id="site-header"></header>
<div id="detailRoot"><div class="spinner"></div></div>
<footer id="site-footer"></footer>
<script src="/js/i18n.js"></script>
<script src="/js/api.js"></script>
<script src="/js/components.js"></script>
<script>
const slug = new URLSearchParams(location.search).get('slug');
let DATA = null;

async function load(){
  if(!slug){ location.href='/courses.html'; return; }
  try{ DATA = await API.get('/courses/'+encodeURIComponent(slug)); render(); }
  catch(e){ document.getElementById('detailRoot').innerHTML = `<div class="page container"><div class="empty">${e.message}</div></div>`; }
}

function render(){
  const {course:c, lessons, reviews, enrolled} = DATA;
  const price = c.discountPrice && c.discountPrice<c.price
    ? `${money(c.discountPrice,c.currency)} <span class="old">${money(c.price)}</span>` : money(c.price,c.currency);
  const cta = enrolled
    ? `<a href="/learn.html?course=${c.id}" class="btn btn-primary btn-block">${t('continue')}</a>`
    : `<button class="btn btn-primary btn-block" id="buyBtn">${(c.price>0)?t('buy_now'):t('enroll')}</button>`;

  // group lessons by section (subcategory), preserving order
  const _groups=[], _idx={};
  lessons.forEach(l=>{ const key=(L(l,'section')||'').trim()||'__none';
    if(!(key in _idx)){ _idx[key]=_groups.length; _groups.push({name:L(l,'section')||'', items:[] }); }
    _groups[_idx[key]].items.push(l); });
  const lessonRows = _groups.map((g,gi)=>`
    ${g.name?`<div style="font-weight:800;color:var(--primary);margin:${gi?'22px':'4px'} 0 10px;display:flex;align-items:center;gap:8px">
       <span style="width:26px;height:26px;border-radius:8px;background:var(--violet-50);display:grid;place-items:center;font-size:.8rem">${gi+1}</span>
       ${g.name} <span class="muted" style="font-weight:500;font-size:.85rem">· ${g.items.length} ${t('lessons')}</span></div>`:''}
    ${g.items.map(l=>`
      <div class="lesson-item">
        <div class="ix">${l.order}</div>
        <div class="l-title">${L(l,'title')} ${l.preview?`<span class="pill blue">${t('preview')}</span>`:''}</div>
        <div class="l-dur">${l.locked?'🔒':'▶'} ${l.durationMin||0}m</div>
      </div>`).join('')}
  `).join('');

  const reviewRows = reviews.length ? reviews.map(r=>`
    <div class="review"><div class="who">${r.userName} <span class="stars">${stars(r.rating)}</span></div>
      <p style="margin:.4em 0 0">${r.comment||''}</p></div>`).join('') : `<p class="muted">—</p>`;

  document.getElementById('detailRoot').innerHTML = `
  <section class="detail-hero">
    <div class="container detail-grid">
      <div>
        <div class="breadcrumb"><a href="/courses.html">${t('nav_courses')}</a> / ${c.category}</div>
        <h1>${L(c,'title')}</h1>
        <p style="font-size:1.1rem;opacity:.95">${L(c,'summary')}</p>
        <div class="detail-meta">
          <span>👤 ${c.instructor}</span>
          <span>📚 ${c.lessonCount} ${t('lessons')}</span>
          <span>👥 ${c.studentCount} ${t('students')}</span>
          <span class="stars">${stars(c.rating)} ${c.rating||''} (${c.reviewCount})</span>
          <span>🏷️ ${levelLabel(c.level)}</span>
        </div>
      </div>
      <div class="buy-card">
        <div class="thumb">${c.thumbnail?`<img src="${c.thumbnail}" onerror="this.style.display='none'">`:''}</div>
        <div class="body">
          <div class="price" style="margin-bottom:14px">${price}</div>
          ${cta}
          <div style="margin-top:14px" class="muted">${(c.tags||[]).map(x=>`<span class="tag-pill">${x}</span>`).join('')}</div>
        </div>
      </div>
    </div>
  </section>
  <main class="page"><div class="container detail-grid">
    <div>
      <h2 data-i18n="about_course">${t('about_course')}</h2>
      <p style="white-space:pre-line">${L(c,'description')}</p>
      <h2 style="margin-top:34px">${t('curriculum')}</h2>
      <div class="lesson-list">${lessonRows}</div>
      <h2 style="margin-top:34px">${t('reviews')} (${c.reviewCount})</h2>
      ${reviewRows}
    </div>
    <div></div>
  </div></main>`;

  const buy = document.getElementById('buyBtn');
  if(buy) buy.onclick = ()=>{
    if(!API.isAuthed()){ location.href='/login.html?next='+encodeURIComponent('/checkout.html?course='+c.id); return; }
    location.href = '/checkout.html?course='+c.id;
  };
  applyI18n();
}
document.addEventListener('DOMContentLoaded', load);
document.addEventListener('langchange', ()=>{ if(DATA) render(); });
</script>
<script src="/js/app.js"></script>
</body>
</html>
